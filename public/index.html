<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a3a1f" />

    <!-- Default SEO — react-helmet-async overrides these per page -->
    <title>MNTP Farm Fresh — Dehydrated Fruits &amp; Vegetables Manufacturer, Solapur</title>
    <meta
      name="description"
      content="MNTP Farm Fresh is a dehydrated fruits and vegetables manufacturer in Solapur, Maharashtra. Export-grade dehydrated ginger, green chilli, carrot, spinach, banana, mango. FSSAI licensed, ISO 22000, APEDA registered."
    />
    <meta name="keywords" content="dehydrated vegetables manufacturer India, dehydrated fruits exporter, dehydrated ginger supplier, dried vegetables bulk, MNTP Farm Fresh, Solapur dehydrated food" />
    <meta name="author" content="MNTP Farm Fresh" />

    <!-- Geo tags — help local/regional search -->
    <meta name="geo.region"   content="IN-MH" />
    <meta name="geo.placename" content="Solapur, Maharashtra" />
    <meta name="geo.position"  content="17.6805;75.9064" />
    <meta name="ICBM"          content="17.6805, 75.9064" />

    <!-- Open Graph fallback (overridden per page by Helmet) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="MNTP Farm Fresh" />
    <meta property="og:title"       content="MNTP Farm Fresh — Dehydrated Fruits &amp; Vegetables Manufacturer" />
    <meta property="og:description" content="Export-grade dehydrated ginger, chilli, carrot, spinach, banana, mango. Bulk supply for food manufacturers worldwide. Solapur, Maharashtra." />
    <meta property="og:image"       content="https://www.mntpfarmfresh.com/og-image.jpg" />
    <meta property="og:url"         content="https://www.mntpfarmfresh.com" />

    <!-- Twitter Card fallback -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MNTP Farm Fresh — Dehydrated Fruits &amp; Vegetables" />
    <meta name="twitter:description" content="Export-grade dehydrated produce from Solapur, Maharashtra. Bulk supply worldwide." />
    <meta name="twitter:image"       content="https://www.mntpfarmfresh.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect for Google Fonts (already used in your app) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <!-- Fallback text for bots that don't run JS at all -->
    <noscript>
      MNTP Farm Fresh manufactures and exports dehydrated fruits and vegetables from Solapur, Maharashtra, India.
      Products include dehydrated ginger, green chilli, carrot, cabbage, spinach, banana, and mango — available in
      flakes, powder, slices, and granules. FSSAI licensed, ISO 22000 certified, APEDA registered. Bulk supply for
      food manufacturers and exporters worldwide. Contact: contact@mntpfarmfresh.com | +91 9423591545.
    </noscript>
    <div id="root"></div>

    <!--
      HIDDEN FORM — DO NOT REMOVE.
      This is invisible and never shown to real visitors. It exists purely
      so Netlify's build bot detects this form schema and creates the
      "enquiry" form in your Netlify dashboard. Your real React form in
      App.jsx submits matching data here via fetch(), and Netlify links
      those submissions to this schema automatically.
    -->
    <form name="enquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="product" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
